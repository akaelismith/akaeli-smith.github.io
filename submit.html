        <section class="welcome">
            <h2>Submit a Book Recommendation</h2>
            <p>Use this page to share one of your favorite books.</p>

            <form>
                <p>
                    <label for="title">Book Title:</label><br>
                    <input type="text" id="title" name="title" size="40">
                </p>

                <p>
                    <label for="author">Author:</label><br>
                    <input type="text" id="author" name="author" size="40">
                </p>

                <p>
                    <label for="genre">Genre:</label><br>
                    <input type="text" id="genre" name="genre" size="40">
                </p>

                <p>
                    <label for="reason">Why do you recommend it?</label><br>
                    <textarea id="reason" name="reason" rows="6" cols="50"></textarea>
                </p>

                <p>
                    <input class="button" type="submit" value="Submit Recommendation">
                </p>
            </form>
        </section>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit a Book</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="wrapper">

        <header>
            <div class="logo">LOGO</div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="genres.html">Genres</a></li>
                    <li><a href="books-to-film.html">Books to Film</a></li>
                    <li><a href="submit.html">Submit a Book</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </header>

        <section class="welcome">
            <h2>Submit a Book Recommendation</h2>
            <p>Use this page to share one of your favorite books.</p>

            <form>
                <p>
                    <label for="title">Book Title:</label><br>
                    <input type="text" id="title" name="title" size="40">
                </p>

                <p>
                    <label for="author">Author:</label><br>
                    <input type="text" id="author" name="author" size="40">
                </p>

                <p>
                    <label for="genre">Genre:</label><br>
                    <input type="text" id="genre" name="genre" size="40">
                </p>

                <p>
                    <label for="reason">Why do you recommend it?</label><br>
                    <textarea id="reason" name="reason" rows="6" cols="50"></textarea>
                </p>

                <p>
                    <input class="button" type="submit" value="Submit Recommendation">
                </p>
            </form>
        </section>

        <footer>
            <div>About Links</div>
            <div>Quick Links</div>
            <div>Social Media Icons</div>
        </footer>

    </div>
</body>
</html>
